kind = "web"
previewPath = "/"
title = "Resume Parser"
version = "1.0.0"
id = "artifacts/resume-parser"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25270

[services.development]
run = "pnpm --filter @workspace/resume-parser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-parser", "run", "build" ]
publicDir = "artifacts/resume-parser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25270"
BASE_PATH = "/"

# ============================================================
# cloudbuild.yaml — Resume Analyzer CI/CD Pipeline
# Triggered on push to main branch
#
# This pipeline:
#   1. Builds the frontend (Vite/React) → deploys to Firebase Hosting
#   2. Builds the backend Docker image → deploys to Cloud Run
# ============================================================

steps:
  # ── Install pnpm ──────────────────────────────────────────
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - "corepack enable && corepack prepare pnpm@10.33.0 --activate"
    id: "install-pnpm"

  # ── Install workspace dependencies ───────────────────────
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - "corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install --frozen-lockfile"
    id: "install-deps"
    waitFor: ["install-pnpm"]

  # ── Build frontend (Vite) ─────────────────────────────────
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        corepack enable && corepack prepare pnpm@10.33.0 --activate
        pnpm --filter @workspace/portfolio run build
    id: "build-frontend"
    env:
      - "VITE_API_URL=${_VITE_API_URL}"
      - "NODE_ENV=production"
    waitFor: ["install-deps"]

  # ── Deploy frontend to Firebase Hosting ───────────────────
  - name: "gcr.io/firebase-tools/firebase:latest"
    args:
      - "deploy"
      - "--only"
      - "hosting"
      - "--project"
      - "${_FIREBASE_PROJECT_ID}"
    id: "deploy-frontend"
    waitFor: ["build-frontend"]

  # ── Build backend Docker image ────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/${PROJECT_ID}/resume-analyzer-api:${SHORT_SHA}"
      - "-t"
      - "gcr.io/${PROJECT_ID}/resume-analyzer-api:latest"
      - "-f"
      - "artifacts/api-server/Dockerfile"
      - "."
    id: "build-backend-image"
    waitFor: ["install-deps"]

  # ── Push backend image to Container Registry ──────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "gcr.io/${PROJECT_ID}/resume-analyzer-api"
    id: "push-backend-image"
    waitFor: ["build-backend-image"]

  # ── Deploy backend to Cloud Run ───────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "resume-analyzer-api"
      - "--image=gcr.io/${PROJECT_ID}/resume-analyzer-api:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production,PORT=8080"
      - "--set-secrets=OPENAI_API_KEY=openai-api-key:latest,ADMIN_PASSWORD=admin-password:latest"
    id: "deploy-backend"
    waitFor: ["push-backend-image"]

# ── Substitution variables (set in Cloud Build trigger) ───────
substitutions:
  _REGION: "us-central1"
  _FIREBASE_PROJECT_ID: "resume-analyzer-YOUR_PROJECT_ID"
  _VITE_API_URL: "https://resume-analyzer-api-XXXX-uc.a.run.app"

# ── Store built images ────────────────────────────────────────
images:
  - "gcr.io/${PROJECT_ID}/resume-analyzer-api:${SHORT_SHA}"
  - "gcr.io/${PROJECT_ID}/resume-analyzer-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
